<!DOCTYPE html>

<html>
<head>
<title>EDGEFIRE Command Center</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
}

.header {
    padding: 15px;
    background: #020617;
    display: flex;
    justify-content: space-between;
}

.badge {
    padding: 8px 15px;
    border-radius: 8px;
    margin-right: 10px;
}

.blue { background: #0ea5e9; }
.red { background: #ef4444; }
.orange { background: #f59e0b; }

.container {
    display: flex;
}

.sidebar {
    width: 300px;
    padding: 20px;
    background: #020617;
}

.map {
    flex: 1;
    position: relative;
}

.map img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

.button {
    padding: 12px;
    margin-top: 10px;
    width: 100%;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.log {
    margin-top: 20px;
    font-size: 14px;
    color: #94a3b8;
}
</style>

</head>

<body>

<div class="header">
    <div>
        <span class="badge blue">● SENSOR NODES</span>
        <span class="badge red">● ACTIVE FIRES</span>
        <span class="badge orange">● NASA FIRMS</span>
    </div>
    <div>📍 India Command Grid</div>
</div>

<div class="container">

<div class="sidebar">
    <h2>EDGEFIRE Control Panel</h2>

```
<input type="file" id="imageUpload">

<button class="button" onclick="startDemo()">🚀 Start Detection</button>

<button class="button" onclick="openHF()">🔍 Open Detection Engine</button>

<button class="button" onclick="openDashboard()">📊 Open Dashboard</button>

<div class="log" id="logBox">
    Waiting for input...
</div>
```

</div>

<div class="map">
    <img src="https://i.imgur.com/6r8FQkG.png">
</div>

</div>

<script>

function log(msg){
    document.getElementById("logBox").innerHTML += "<br>" + msg;
}

function openHF(){
    window.open("https://huggingface.co/spaces/shreyyans/hack-o-verse-wildfire-detection-mvp", "_blank");
}

function openDashboard(){
    window.open("https://hack-o-verse-wildfire-detection-system-mvp.streamlit.app/", "_blank");
}

function startDemo(){

    document.getElementById("logBox").innerHTML = "Starting pipeline...";

    setTimeout(()=>log("📡 Sensors triggered: Heat anomaly detected"),1000);
    setTimeout(()=>log("📷 Camera capturing image..."),2000);
    setTimeout(()=>log("☁️ Uploading to Firebase..."),3000);

    setTimeout(()=>{
        log("🔍 Running YOLOv8 detection...");
        openHF();
    },4000);

    setTimeout(()=>log("🧠 Gemini AI analyzing severity..."),6000);

    setTimeout(()=>{
        log("🚨 Fire detected! Alert generated.");
        openDashboard();
    },8000);
}

</script>

</body>
</html>
